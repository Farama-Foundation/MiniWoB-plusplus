name: build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Remove existing Chrome and ChromeDriver installation on macOS
        if: runner.os == 'macOS'
        run: |
          brew uninstall google-chrome || true
          brew uninstall chromedriver || true
      - name: Install Chrome and matching ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 150
          install-chromedriver: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[testing] --no-cache-dir
      - name: Run tests
        run: |
          pytest -n logical -v --timeout=20 -x tests/test_api.py
          pytest -v --timeout=20 --ignore=tests/test_api.py -x tests/
